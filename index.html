  <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeraLog</title>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-muted: #aaaaaa;
            --accent-finished: #4caf50; --accent-playing: #2196f3; --accent-add: #ff9800;
            --danger: #f44336; --border-color: #333;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .app-title { font-size: 1.8em; font-weight: bold; color: var(--accent-playing); margin: 0; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: var(--card-bg); border: none; color: white; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { border-bottom: 3px solid var(--accent-playing); background: #2a2a2a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .category { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .category-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px; }
        .game-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .game-icon { width: 45px; height: 45px; background: #000; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; cursor: pointer; }
        .game-info { flex: 1; }
        .game-title { font-weight: bold; display: block; }
        .game-meta { font-size: 0.8em; color: var(--text-muted); }
        .actions { display: flex; flex-direction: column; gap: 5px; margin-right: 10px; font-size: 0.8em; }
        button { background: var(--accent-add); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        dialog { background: var(--card-bg); color: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; width: 90%; max-width: 400px; }
        .modal-form { display: flex; flex-direction: column; gap: 15px; }
        input, select { padding: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; }
        .btn-top { background: transparent; font-size: 1.5em; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="app-title">ZeraLog</h1>
        <div>
            <button class="btn-top" onclick="document.getElementById('modal-backup').showModal()">💾</button>
            <button class="btn-top" onclick="document.getElementById('modal-settings').showModal()">⚙️</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="b-home" onclick="setTab('home')">🏠 Fila</button>
        <button class="tab-btn" id="b-fin" onclick="setTab('fin')">🏆 Zerados</button>
    </div>

    <div id="t-home" class="tab-content active">
        <div id="main-container"></div>
        <button style="width: 100%; padding: 15px; margin-top: 10px;" onclick="document.getElementById('modal-cat').showModal()">+ Nova Categoria</button>
    </div>

    <div id="t-fin" class="tab-content">
        <div class="category">
            <h2>Sala de Troféus</h2>
            <div id="finished-list"></div>
        </div>
    </div>

    <!-- Modais -->
    <dialog id="modal-welcome">
        <div class="modal-form" style="text-align: center;">
            <h2>Bem-vindo ao ZeraLog! 🎮</h2>
            <p>Seu backlog organizado.</p>
            <button onclick="localStorage.setItem('z_w','1'); document.getElementById('modal-welcome').close()">Começar!</button>
        </div>
    </dialog>

    <dialog id="modal-cat">
        <div class="modal-form">
            <h3>Nova Categoria</h3>
            <input type="text" id="cat-in" placeholder="Nome">
            <button onclick="addCat()">Salvar</button>
            <button onclick="document.getElementById('modal-cat').close()">Fechar</button>
        </div>
    </dialog>

    <dialog id="modal-game">
        <div class="modal-form">
            <h3>Novo Jogo</h3>
            <input type="hidden" id="g-cat-id">
            <input type="text" id="g-title" placeholder="Nome">
            <input type="text" id="g-time" placeholder="Tempo (ex: 10h)">
            <button onclick="addGame()">Adicionar</button>
            <button onclick="document.getElementById('modal-game').close()">Fechar</button>
        </div>
    </dialog>

    <dialog id="modal-rating">
        <div class="modal-form">
            <h3>Nota do Jogo</h3>
            <input type="hidden" id="r-id">
            <input type="number" id="r-val" min="0" max="10" value="10">
            <button onclick="saveFin()">Zerar!</button>
        </div>
    </dialog>

    <dialog id="modal-backup">
        <div class="modal-form">
            <h3>💾 Backup</h3>
            <button onclick="exportData()">Baixar .json</button>
            <input type="file" id="f-in" style="display:none" onchange="importData(event)">
            <button onclick="document.getElementById('f-in').click()">Restaurar Arquivo</button>
            <button onclick="document.getElementById('modal-backup').close()">Fechar</button>
        </div>
    </dialog>

    <dialog id="modal-settings">
        <div class="modal-form">
            <h3>⚙️ Configurações</h3>
            <button style="background:var(--danger)" onclick="if(confirm('Apagar tudo?')){localStorage.clear(); location.reload();}">REDEFINIR APP</button>
            <button onclick="document.getElementById('modal-settings').close()">Fechar</button>
        </div>
    </dialog>

    <script>
        let db = JSON.parse(localStorage.getItem('z_db')) || { cats: [{id:'c1', name:'Geral'}], games: [] };

        function refresh() {
            localStorage.setItem('z_db', JSON.stringify(db));
            const cont = document.getElementById('main-container');
            const finCont = document.getElementById('finished-list');
            cont.innerHTML = ''; finCont.innerHTML = '';

            // Jogando
            const playing = db.games.filter(g => g.s === 'p');
            if(playing.length) {
                const d = document.createElement('div'); d.className = 'category';
                d.innerHTML = '<h2>🕹️ Jogando</h2>';
                playing.forEach(g => d.appendChild(drawGame(g)));
                cont.appendChild(d);
            }

            // Backlog
            db.cats.forEach(c => {
                const gs = db.games.filter(g => g.c === c.id && !g.s);
                const d = document.createElement('div'); d.className = 'category';
                d.innerHTML = `<div class="category-header"><h2>${c.name}</h2><button onclick="openG('${c.id}')">+ Jogo</button></div>`;
                gs.forEach(g => d.appendChild(drawGame(g)));
                cont.appendChild(d);
            });

            // Finalizados
            db.games.filter(g => g.s === 'f').forEach(g => finCont.appendChild(drawGame(g)));
        }

        function drawGame(g) {
            const el = document.createElement('div'); el.className = 'game-item';
            el.innerHTML = `<div class="game-icon">🎮</div><div class="game-info"><span class="game-title">${g.t}</span><span class="game-meta">${g.m||''} ${g.r?'⭐'+g.r:''}</span></div><div class="actions"><label><input type="checkbox" ${g.s==='p'?'checked':''} onchange="setS('${g.id}','p')"> Jogando</label><label><input type="checkbox" ${g.s==='f'?'checked':''} onchange="setS('${g.id}','f')"> Final</label></div><button onclick="delG('${g.id}')">🗑️</button>`;
            return el;
        }

        function setS(id, s) {
            const g = db.games.find(x => x.id === id);
            if(s === 'f' && g.s !== 'f') {
                document.getElementById('r-id').value = id;
                document.getElementById('modal-rating').showModal();
            } else {
                g.s = g.s === s ? null : s;
                refresh();
            }
        }

        function saveFin() {
            const g = db.games.find(x => x.id === document.getElementById('r-id').value);
            g.s = 'f'; g.r = document.getElementById('r-val').value;
            document.getElementById('modal-rating').close(); refresh();
        }

        function addCat() {
            const n = document.getElementById('cat-in').value;
            if(!n) return;
            db.cats.push({id: 'c'+Date.now(), name: n});
            document.getElementById('modal-cat').close(); refresh();
        }

        function openG(cid) { document.getElementById('g-cat-id').value = cid; document.getElementById('modal-game').showModal(); }
        function addGame() {
            const t = document.getElementById('g-title').value;
            if(!t) return;
            db.games.push({id:'g'+Date.now(), c: document.getElementById('g-cat-id').value, t: t, m: document.getElementById('g-time').value, s: null});
            document.getElementById('modal-game').close(); refresh();
        }

        function delG(id) { if(confirm('Excluir?')) { db.games = db.games.filter(x => x.id !== id); refresh(); } }

        function setTab(t) {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('b-'+t).classList.add('active');
            document.getElementById('t-'+t).classList.add('active');
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
        }

        function importData(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => { db = JSON.parse(ev.target.result); refresh(); }; r.readAsText(f);
        }

        refresh();
        if(!localStorage.getItem('z_w')) document.getElementById('modal-welcome').showModal();
    </script>
</body>
</html>
